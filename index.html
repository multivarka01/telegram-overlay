<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Telegram Overlay</title>

<style>
body{
    margin:0;
    background:#181818;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    font-family:Arial;
}

.card{
    width:900px;
    height:500px;
    border-radius:25px;
    background:#2b2d31;
    display:flex;
    overflow:hidden;
}

.telegram{
    width:55%;
    background:#202225;
    padding:20px;
}

.qr{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
}
</style>

</head>

<body>

<div class="card">

<div class="telegram">

<h2>Telegram</h2>

<p>Здесь скоро будет пост.</p>

</div>

<div class="qr">

QR

</div>

</div>

</body>
</html>
